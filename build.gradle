plugins {
    id 'java'
}

group = 'com.adminsec'
version = '1.1.1'

repositories { mavenCentral() }

dependencies {
    compileOnly 'net.portswigger.burp.extensions:montoya-api:2026.4'
    implementation 'com.google.code.gson:gson:2.14.0'
    implementation 'com.google.re2j:re2j:1.8'
    implementation 'org.jsoup:jsoup:1.22.2'

    testImplementation 'net.portswigger.burp.extensions:montoya-api:2026.4'
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.2'
    testImplementation 'org.mockito:mockito-core:5.17.0'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

java { toolchain { languageVersion = JavaLanguageVersion.of(17) } }

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.release = 17
}

test {
    useJUnitPlatform()
    systemProperty 'java.awt.headless', 'true'
}

jar {
    archiveBaseName = 'js-secret-hunter'
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    from { configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) } }
    manifest { attributes('Main-Class': 'com.adminsec.jssecrethunter.JsSecretHunterExtension') }
}
