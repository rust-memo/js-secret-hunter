name: Build extension

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Test and package
        run: |
          chmod +x ./gradlew
          ./gradlew clean test jar --no-daemon
      - name: Upload Burp extension JAR
        uses: actions/upload-artifact@v7
        with:
          path: build/libs/js-secret-hunter-1.3.0.jar
